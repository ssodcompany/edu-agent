<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #fff; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background-image: url('../assets/bg-warm.png');
  background-size: cover;
  display: flex;
  padding: 0;
}
</style>
</head>
<body>
  <!-- Left gold accent bar -->
  <div style="width: 5pt; background: #C4963C;"></div>

  <!-- Main content -->
  <div style="flex: 1; padding: 44pt 52pt; display: flex; flex-direction: column; justify-content: space-between;">
    <!-- Top row -->
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <p style="font-size: 9pt; color: #C4963C; font-weight: bold; letter-spacing: 0.1em;">BNI EDUCATION</p>
      <div style="display: flex; align-items: center; gap: 8pt;">
        <div style="width: 6pt; height: 6pt; background: #C4963C; border-radius: 50%;"></div>
        <p style="font-size: 9pt; color: #AAAAAA;">10-Minute Lecture</p>
      </div>
    </div>

    <!-- Center -->
    <div style="display: flex; align-items: center; gap: 40pt;">
      <div style="flex: 1; display: flex; flex-direction: column; gap: 8pt;">
        <p style="font-size: 13pt; color: #999999;">AI 시대에</p>
        <h1 style="font-size: 52pt; font-weight: bold; color: #1A1A1A; line-height: 1.15; letter-spacing: -0.02em;">결국</h1>
        <h1 style="font-size: 52pt; font-weight: bold; color: #1A1A1A; line-height: 1.15; letter-spacing: -0.02em;">남는 것</h1>
        <div style="width: 40pt; height: 3pt; background: #C4963C; border-radius: 2pt; margin-top: 12pt;"></div>
      </div>
      <img src="../assets/deco-circle-gold.png" style="width: 140pt; height: 140pt; opacity: 0.5;">
    </div>

    <!-- Bottom -->
    <div style="display: flex; justify-content: space-between; align-items: flex-end;">
      <div style="display: flex; gap: 32pt;">
        <div>
          <p style="font-size: 7pt; color: #BBBBBB; letter-spacing: 0.05em;">DATE</p>
          <p style="font-size: 9pt; color: #666666; margin-top: 3pt;">2026. 02. 24</p>
        </div>
        <div>
          <p style="font-size: 7pt; color: #BBBBBB; letter-spacing: 0.05em;">TOPIC</p>
          <p style="font-size: 9pt; color: #666666; margin-top: 3pt;">신뢰의 희소성</p>
        </div>
      </div>
      <img src="../assets/deco-dots.png" style="width: 60pt; height: 60pt; opacity: 0.4;">
    </div>
  </div>
</body>
</html>
