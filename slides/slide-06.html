<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #FAFAF8; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background-image: url('../assets/bg-data-light.png');
  background-size: cover;
  display: flex;
  flex-direction: column;
  padding: 36pt 48pt;
}
</style>
</head>
<body>
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20pt;">
    <div style="display: flex; align-items: center; gap: 10pt;">
      <div style="width: 4pt; height: 16pt; background: #C4963C; border-radius: 2pt;"></div>
      <h2 style="font-size: 20pt; font-weight: bold; color: #1A1A1A;">일자리의 85%는 네트워킹으로 채워진다</h2>
    </div>
    <p style="font-size: 9pt; color: #CCCCCC;">06</p>
  </div>

  <div style="flex: 1; display: flex; gap: 20pt;">
    <div style="width: 200pt; background: #1A1A1A; border-radius: 12pt; padding: 28pt; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
      <p style="font-size: 72pt; font-weight: bold; color: #C4963C;">85%</p>
      <div style="width: 30pt; height: 2pt; background: #C4963C; margin-top: 12pt; margin-bottom: 12pt;"></div>
      <p style="font-size: 10pt; color: #888888;">LinkedIn 3,000명+</p>
      <p style="font-size: 11pt; color: #FFFFFF; font-weight: bold; margin-top: 4pt;">네트워킹으로 채용</p>
    </div>

    <div style="flex: 1; display: flex; flex-direction: column; gap: 10pt;">
      <div style="flex: 1; background: #FFFFFF; border-radius: 8pt; padding: 16pt 20pt; box-shadow: 0 1pt 4pt rgba(0,0,0,0.05); display: flex; align-items: center; gap: 16pt;">
        <div style="width: 52pt; height: 52pt; background: #FFF0F0; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
          <p style="font-size: 22pt; font-weight: bold; color: #E04848;">7%</p>
        </div>
        <div>
          <p style="font-size: 12pt; color: #1A1A1A; font-weight: bold;">추천 지원자 비율</p>
          <p style="font-size: 10pt; color: #999999; margin-top: 2pt;">전체 지원자의 7%에 불과</p>
        </div>
      </div>

      <div style="flex: 1; background: #FFFFFF; border-radius: 8pt; padding: 16pt 20pt; box-shadow: 0 1pt 4pt rgba(0,0,0,0.05); display: flex; align-items: center; gap: 16pt;">
        <div style="width: 52pt; height: 52pt; background: #EEFAF5; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
          <p style="font-size: 22pt; font-weight: bold; color: #2B8C6F;">40%</p>
        </div>
        <div>
          <p style="font-size: 12pt; color: #1A1A1A; font-weight: bold;">실제 채용 비율</p>
          <p style="font-size: 10pt; color: #999999; margin-top: 2pt;">추천이 실제 채용의 40%를 차지</p>
        </div>
      </div>

      <div style="background: #FDF8EF; border-radius: 8pt; padding: 12pt 20pt; display: flex; align-items: center; gap: 10pt;">
        <img src="../assets/icon-arrow.png" style="width: 14pt; height: 14pt;">
        <p style="font-size: 10pt; color: #1A1A1A; line-height: 1.4;">AI 채용 필터(ATS) 강화 <span style="font-weight: bold; color: #C4963C;">→ 내부 추천의 가치 상승</span></p>
      </div>
    </div>
  </div>
</body>
</html>
