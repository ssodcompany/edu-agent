<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #FAFAF8; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background-image: url('../assets/bg-data-light.png');
  background-size: cover;
  display: flex;
  flex-direction: column;
  padding: 36pt 48pt;
}
</style>
</head>
<body>
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16pt;">
    <h2 style="font-size: 18pt; font-weight: bold; color: #1A1A1A;">AI가 절약해준 시간을 <span style="color: #C4963C;">사람에게 투자하세요</span></h2>
    <p style="font-size: 9pt; color: #CCCCCC;">09</p>
  </div>

  <div style="display: flex; align-items: center; gap: 8pt; margin-bottom: 14pt;">
    <div style="background: #1A1A1A; border-radius: 4pt; padding: 6pt 16pt; overflow: hidden;">
      <p style="font-size: 9pt; color: #C4963C; font-weight: bold; white-space: nowrap; line-height: 1.2;">1-1-1 RULE</p>
    </div>
    <div style="flex: 1; height: 1pt; background: #EEEEEE;"></div>
  </div>

  <div style="flex: 1; display: flex; gap: 14pt;">
    <div style="flex: 1; background: #FFFFFF; border-radius: 10pt; padding: 20pt; box-shadow: 0 2pt 8pt rgba(0,0,0,0.06); display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10pt;">
      <img src="../assets/badge-1.png" style="width: 36pt; height: 36pt;">
      <p style="font-size: 9pt; color: #999999;">매주</p>
      <p style="font-size: 14pt; color: #1A1A1A; font-weight: bold; line-height: 1.4;">1명에게</p>
      <p style="font-size: 14pt; color: #C4963C; font-weight: bold; line-height: 1.4;">먼저 연락</p>
    </div>

    <div style="flex: 1; background: #FFFFFF; border-radius: 10pt; padding: 20pt; box-shadow: 0 2pt 8pt rgba(0,0,0,0.06); display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10pt;">
      <img src="../assets/badge-2.png" style="width: 36pt; height: 36pt;">
      <p style="font-size: 9pt; color: #999999;">매주</p>
      <p style="font-size: 14pt; color: #1A1A1A; font-weight: bold; line-height: 1.4;">1시간을</p>
      <p style="font-size: 14pt; color: #C4963C; font-weight: bold; line-height: 1.4;">만남에 투자</p>
    </div>

    <div style="flex: 1; background: #FFFFFF; border-radius: 10pt; padding: 20pt; box-shadow: 0 2pt 8pt rgba(0,0,0,0.06); display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10pt;">
      <img src="../assets/badge-3.png" style="width: 36pt; height: 36pt;">
      <p style="font-size: 9pt; color: #999999;">만남마다</p>
      <p style="font-size: 14pt; color: #1A1A1A; font-weight: bold; line-height: 1.4;">1가지 도움을</p>
      <p style="font-size: 14pt; color: #C4963C; font-weight: bold; line-height: 1.4;">먼저 제공</p>
    </div>
  </div>

  <div style="background: #1A1A1A; border-radius: 6pt; padding: 12pt 24pt; margin-top: 12pt; display: flex; justify-content: center; align-items: center; gap: 16pt; overflow: hidden;">
    <p style="font-size: 10pt; color: #AAAAAA; white-space: nowrap;">1년 = <span style="color: #FFFFFF; font-weight: bold;">52명</span></p>
    <img src="../assets/icon-arrow.png" style="width: 10pt; height: 10pt;">
    <p style="font-size: 10pt; color: #AAAAAA; white-space: nowrap;">3년 = <span style="color: #C4963C; font-weight: bold;">150명</span></p>
    <img src="../assets/icon-arrow.png" style="width: 10pt; height: 10pt;">
    <p style="font-size: 10pt; color: #C4963C; font-weight: bold; white-space: nowrap;">관계 자본 완성</p>
  </div>
</body>
</html>
