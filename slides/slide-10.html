<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #fff; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background-image: url('../assets/bg-warm.png');
  background-size: cover;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 44pt 64pt 48pt 64pt;
}
</style>
</head>
<body>
  <img src="../assets/deco-dots.png" style="position: absolute; top: 24pt; right: 32pt; width: 48pt; height: 48pt; opacity: 0.3;">

  <div style="display: flex; flex-direction: column; align-items: center; gap: 16pt;">
    <div style="width: 56pt; height: 56pt; background: #FDF8EF; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
      <img src="../assets/icon-phone.png" style="width: 24pt; height: 24pt;">
    </div>

    <h1 style="font-size: 28pt; font-weight: bold; color: #1A1A1A; line-height: 1.3;">오늘, 한 사람에게 먼저 연락하세요</h1>

    <div style="width: 40pt; height: 2pt; background: #C4963C;"></div>

    <p style="font-size: 14pt; color: #888888; line-height: 1.5;">3개월 이상 연락 못 한 사람 한 명.</p>

    <div style="background: #FFFFFF; border-radius: 10pt; padding: 18pt 32pt; box-shadow: 0 2pt 12pt rgba(0,0,0,0.08); margin-top: 4pt;">
      <p style="font-size: 20pt; color: #C4963C; font-weight: bold;">"요즘 어떻게 지내세요?"</p>
    </div>

    <p style="font-size: 13pt; color: #666666; line-height: 1.5; margin-top: 4pt;">이 한 줄이 당신의 네트워크를 살리는 <span style="color: #C4963C; font-weight: bold;">첫 마중물</span>입니다.</p>
  </div>
</body>
</html>
