<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #fff; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background: #FFFFFF;
  display: flex;
  padding: 0;
}
</style>
</head>
<body>
  <!-- Left red accent bar -->
  <div style="width: 5pt; background: #E04848;"></div>

  <div style="flex: 1; padding: 40pt 48pt 40pt 44pt; display: flex; flex-direction: column;">
    <!-- Top label with icon -->
    <div style="display: flex; align-items: center; gap: 10pt; margin-bottom: 20pt;">
      <img src="../assets/icon-robot.png" style="width: 22pt; height: 22pt;">
      <p style="font-size: 9pt; color: #E04848; font-weight: bold; letter-spacing: 0.06em;">OPENING HOOK</p>
      <div style="flex: 1; height: 1pt; background: #EEEEEE; margin-left: 8pt;"></div>
      <p style="font-size: 9pt; color: #CCCCCC;">02</p>
    </div>

    <!-- Two column layout -->
    <div style="flex: 1; display: flex; gap: 28pt;">
      <!-- Left: Impact text -->
      <div style="flex: 1.2; display: flex; flex-direction: column; justify-content: center; gap: 14pt;">
        <h1 style="font-size: 28pt; font-weight: bold; color: #1A1A1A; line-height: 1.35;">GitHub 스타 <span style="color: #E04848;">20만 개.</span></h1>
        <h1 style="font-size: 28pt; font-weight: bold; color: #1A1A1A; line-height: 1.35;">카카오, 네이버, 당근마켓</h1>
        <h1 style="font-size: 28pt; font-weight: bold; color: #E04848; line-height: 1.35;">사용금지.</h1>
      </div>

      <!-- Right: Description card -->
      <div style="width: 200pt; display: flex; flex-direction: column; justify-content: center;">
        <div style="background: #F8F8F6; border-radius: 8pt; padding: 20pt; border-left: 3pt solid #C4963C;">
          <p style="font-size: 12pt; color: #666666; line-height: 1.7;">여러분, <span style="color: #1A1A1A; font-weight: bold;">오픈클로</span> 아시죠?</p>
          <p style="font-size: 12pt; color: #666666; line-height: 1.7; margin-top: 10pt;">카톡으로 메시지 하나 보내면 AI가 컴퓨터를 조작합니다.</p>
          <p style="font-size: 13pt; color: #C4963C; font-weight: bold; margin-top: 12pt;">사람 없이도요.</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
