<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #FAFAF8; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background-image: url('../assets/bg-data-light.png');
  background-size: cover;
  display: flex;
  flex-direction: column;
  padding: 36pt 48pt 36pt 48pt;
}
</style>
</head>
<body>
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20pt;">
    <div style="display: flex; align-items: center; gap: 10pt;">
      <div style="width: 4pt; height: 16pt; background: #C4963C; border-radius: 2pt;"></div>
      <h2 style="font-size: 20pt; font-weight: bold; color: #1A1A1A;">정보는 무료가 됐다. 신뢰만 유료다.</h2>
    </div>
    <p style="font-size: 9pt; color: #CCCCCC;">05</p>
  </div>

  <div style="flex: 1; display: flex; gap: 14pt;">
    <div style="flex: 1; background: #FFFFFF; border-radius: 10pt; padding: 20pt; box-shadow: 0 2pt 8pt rgba(0,0,0,0.06); display: flex; flex-direction: column; justify-content: space-between;">
      <div style="display: flex; align-items: center; gap: 8pt;">
        <img src="../assets/icon-users.png" style="width: 18pt; height: 18pt;">
        <p style="font-size: 8pt; color: #999999; letter-spacing: 0.04em;">TRUST INDEX</p>
      </div>
      <div>
        <p style="font-size: 44pt; font-weight: bold; color: #C4963C;">64%</p>
        <p style="font-size: 10pt; color: #888888; line-height: 1.5; margin-top: 6pt;">전문가가 AI보다</p>
        <p style="font-size: 11pt; color: #1A1A1A; font-weight: bold; line-height: 1.5;">인간 네트워크를 더 신뢰</p>
      </div>
    </div>

    <div style="flex: 1; background: #FFFFFF; border-radius: 10pt; padding: 20pt; box-shadow: 0 2pt 8pt rgba(0,0,0,0.06); display: flex; flex-direction: column; justify-content: space-between;">
      <div style="display: flex; align-items: center; gap: 8pt;">
        <img src="../assets/icon-chart.png" style="width: 18pt; height: 18pt;">
        <p style="font-size: 8pt; color: #999999; letter-spacing: 0.04em;">CONVERSION</p>
      </div>
      <div>
        <p style="font-size: 30pt; font-weight: bold; color: #1A1A1A;">15~25%</p>
        <p style="font-size: 12pt; color: #E04848; font-weight: bold; margin-top: 4pt;">vs 2~3%</p>
        <p style="font-size: 10pt; color: #888888; line-height: 1.5; margin-top: 6pt;">추천 전환율 vs 콜드콜</p>
        <p style="font-size: 11pt; color: #C4963C; font-weight: bold;">4배 차이</p>
      </div>
    </div>

    <div style="flex: 1; background: #FFFFFF; border-radius: 10pt; padding: 20pt; box-shadow: 0 2pt 8pt rgba(0,0,0,0.06); display: flex; flex-direction: column; justify-content: space-between;">
      <div style="display: flex; align-items: center; gap: 8pt;">
        <img src="../assets/icon-heart.png" style="width: 18pt; height: 18pt;">
        <p style="font-size: 8pt; color: #999999; letter-spacing: 0.04em;">TRUST RATE</p>
      </div>
      <div>
        <p style="font-size: 44pt; font-weight: bold; color: #2B8C6F;">92%</p>
        <p style="font-size: 10pt; color: #888888; line-height: 1.5; margin-top: 6pt;">지인 추천 신뢰율</p>
        <p style="font-size: 10pt; color: #888888; line-height: 1.5;">vs 온라인 광고 <span style="color: #E04848; font-weight: bold;">33%</span></p>
      </div>
    </div>
  </div>

  <div style="background: #1A1A1A; border-radius: 6pt; padding: 10pt 20pt; margin-top: 14pt; display: flex; align-items: center; gap: 10pt;">
    <img src="../assets/icon-arrow.png" style="width: 14pt; height: 14pt;">
    <p style="font-size: 11pt; color: #C4963C; font-weight: bold;">AI가 정보를 무료로 만들수록, 신뢰의 가격은 올라갑니다</p>
  </div>
</body>
</html>
