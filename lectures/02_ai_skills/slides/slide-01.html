<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #f5f5f0; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f0;
  display: flex;
  overflow: hidden;
}
</style>
</head>
<body>

  <!-- Left: thick black bar with session label rotated -->
  <div style="width: 48pt; background: #1a1a1a; flex-shrink: 0; display: flex; align-items: center; justify-content: center; position: relative;">
    <div style="position: absolute; transform: rotate(-90deg); white-space: nowrap;">
      <p style="font-size: 7pt; font-weight: 600; color: #666666; letter-spacing: 0.14em;">BNI K-CHAPTER · AI 시대 네트워킹 #2</p>
    </div>
  </div>

  <!-- Main content area -->
  <div style="flex: 1; display: flex; flex-direction: column; padding: 40pt 52pt 36pt 52pt; position: relative;">

    <!-- Top label -->
    <div style="margin-bottom: 24pt;">
      <p style="font-size: 9pt; font-weight: 500; color: #999999; letter-spacing: 0.1em;">AI가 대체할 수 없는</p>
    </div>

    <!-- Hero title — asymmetric, dominant left -->
    <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
      <h1 style="font-size: 76pt; font-weight: 800; color: #1a1a1a; line-height: 0.95; letter-spacing: -0.04em;">내 Skills</h1>
      <h1 style="font-size: 76pt; font-weight: 800; color: #1a1a1a; line-height: 0.95; letter-spacing: -0.04em;">찾기</h1>
      <!-- Horizontal rule anchored below title -->
      <div style="width: 56pt; height: 3pt; background: #1a1a1a; margin-top: 24pt;"></div>
    </div>

    <!-- Bottom row: date + badge -->
    <div style="display: flex; justify-content: space-between; align-items: flex-end;">
      <p style="font-size: 10pt; font-weight: 400; color: #999999; letter-spacing: 0.04em;">2026. 03. 24</p>
      <div style="background: #1a1a1a; padding: 6pt 16pt;">
        <p style="font-size: 8pt; font-weight: 700; color: #f5f5f0; letter-spacing: 0.12em;">BNI K-CHAPTER</p>
      </div>
    </div>

  </div>

  <!-- Right decorative area: large hollow number -->
  <div style="width: 200pt; flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden;">
    <p style="font-size: 220pt; font-weight: 800; color: #eeeeea; line-height: 1; letter-spacing: -0.05em; margin-right: -40pt;">#2</p>
  </div>

</body>
</html>
