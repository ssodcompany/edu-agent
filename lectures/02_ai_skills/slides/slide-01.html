<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #f5f5f0; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f0;
  display: flex;
}
</style>
</head>
<body>

  <!-- Left accent bar -->
  <div style="width: 4pt; background: #1a1a1a; flex-shrink: 0;"></div>

  <!-- Main content -->
  <div style="flex: 1; display: flex; flex-direction: column; justify-content: space-between; padding: 48pt 56pt 44pt 56pt;">

    <!-- Top: badge row -->
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <div style="border: 1pt solid #1a1a1a; border-radius: 20pt; padding: 5pt 14pt;">
        <p style="font-size: 9pt; font-weight: 600; color: #1a1a1a; letter-spacing: 0.08em;">BNI K-CHAPTER EDUCATION</p>
      </div>
      <p style="font-size: 9pt; color: #999999; letter-spacing: 0.04em;">AI 시대 네트워킹 #2</p>
    </div>

    <!-- Center: main title -->
    <div style="display: flex; flex-direction: column; gap: 10pt;">
      <h1 style="font-size: 52pt; font-weight: 800; color: #1a1a1a; line-height: 1.15; letter-spacing: -0.03em;">AI가 대체할 수 없는</h1>
      <h1 style="font-size: 52pt; font-weight: 800; color: #1a1a1a; line-height: 1.15; letter-spacing: -0.03em;">내 Skills 찾기</h1>
      <div style="width: 48pt; height: 3pt; background: #1a1a1a; border-radius: 2pt; margin-top: 12pt;"></div>
    </div>

    <!-- Bottom: date meta -->
    <div style="display: flex; justify-content: space-between; align-items: flex-end;">
      <div style="display: flex; gap: 32pt;">
        <div>
          <p style="font-size: 7pt; color: #999999; letter-spacing: 0.08em; margin-bottom: 4pt;">DATE</p>
          <p style="font-size: 11pt; color: #666666; font-weight: 500;">2026. 03. 24</p>
        </div>
        <div>
          <p style="font-size: 7pt; color: #999999; letter-spacing: 0.08em; margin-bottom: 4pt;">SESSION</p>
          <p style="font-size: 11pt; color: #666666; font-weight: 500;">10-Minute Education</p>
        </div>
      </div>
      <div style="width: 8pt; height: 8pt; background: #1a1a1a; border-radius: 50%;"></div>
    </div>

  </div>

</body>
</html>
