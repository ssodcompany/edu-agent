<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720, height=405">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', 'Apple SD Gothic Neo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #FFFFFF;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .slide {
    width: 720pt; height: 405pt;
    padding: 60pt 80pt;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .title {
    color: #1A1A1A;
    font-size: 32pt;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 16pt;
    letter-spacing: -0.5pt;
  }
  .accent-line {
    width: 60pt;
    height: 3pt;
    background: #1A73E8;
    margin-bottom: 20pt;
  }
  .subtitle {
    color: #666666;
    font-size: 14pt;
    font-weight: 400;
    line-height: 1.5;
    margin-bottom: 8pt;
  }
  .date {
    color: #999999;
    font-size: 12pt;
    font-weight: 400;
    margin-top: 4pt;
  }
</style>
</head>
<body>
<div class="slide">
  <h1 class="title">AI가 대체할 수 없는<br>내 Skills 찾기</h1>
  <div class="accent-line"></div>
  <p class="subtitle">BNI K-Chapter 교육 | AI 시대 네트워킹 #2</p>
  <p class="date">2026. 03. 24</p>
</div>
</body>
</html>
