<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #f5f5f0; }
body {
  width: 720pt; height: 405pt;
  word-break: keep-all;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f0;
  display: flex;
  overflow: hidden;
}
</style>
</head>
<body>

  <!-- LEFT: hero number dominates (60%) -->
  <div style="width: 360pt; flex-shrink: 0; display: flex; flex-direction: column; padding: 44pt 40pt 44pt 52pt; justify-content: space-between; border-right: 1pt solid #d4d4d0;">

    <!-- Notion source label -->
    <div style="display: flex; align-items: center; gap: 10pt;">
      <img src="../assets/notion-logo.png" style="width: 24pt; height: 24pt;">
      <p style="font-size: 9pt; font-weight: 500; color: #999999; letter-spacing: 0.08em;">NOTION RESEARCH</p>
    </div>

    <!-- The enormous number — hero moment -->
    <div>
      <p style="font-size: 10pt; font-weight: 400; color: #999999; letter-spacing: 0.04em; margin-bottom: 16pt;">컨설턴트가 들어간 회사의 매출</p>
      <h1 style="font-size: 80pt; font-weight: 800; color: #1a1a1a; line-height: 1.1; letter-spacing: -0.05em;">2배</h1>
    </div>

    <!-- Pull quote: compound interest -->
    <div style="border-top: 1pt solid #d4d4d0; padding-top: 16pt;">
      <p style="font-size: 13pt; font-weight: 600; color: #1a1a1a; line-height: 1.5; letter-spacing: -0.01em;">"판단력은 복리로 쌓인다"</p>
    </div>

  </div>

  <!-- RIGHT: equation (40%) -->
  <div style="flex: 1; display: flex; flex-direction: column; padding: 44pt 48pt; justify-content: center; gap: 0pt;">

    <p style="font-size: 9pt; font-weight: 600; color: #999999; letter-spacing: 0.1em; margin-bottom: 24pt;">JUDGMENT ECONOMY</p>

    <!-- Equation items — stacked, no card borders -->
    <div style="display: flex; flex-direction: column; gap: 0pt;">

      <div style="background: #e8e8e3; padding: 14pt 20pt;">
        <p style="font-size: 15pt; font-weight: 600; color: #1a1a1a; letter-spacing: -0.01em;">AI 도구</p>
        <p style="font-size: 10pt; font-weight: 400; color: #888888; margin-top: 2pt;">Claude, Notion, Perplexity...</p>
      </div>

      <div style="padding: 10pt 20pt;">
        <p style="font-size: 22pt; font-weight: 300; color: #1a1a1a;">+</p>
      </div>

      <div style="background: #e8e8e3; padding: 14pt 20pt;">
        <p style="font-size: 15pt; font-weight: 600; color: #1a1a1a; letter-spacing: -0.01em;">사람의 판단력</p>
        <p style="font-size: 10pt; font-weight: 400; color: #888888; margin-top: 2pt;">맥락 · 리스크 · 결정</p>
      </div>

      <div style="padding: 10pt 20pt;">
        <p style="font-size: 22pt; font-weight: 300; color: #1a1a1a;">=</p>
      </div>

      <div style="background: #1a1a1a; padding: 14pt 20pt;">
        <p style="font-size: 15pt; font-weight: 700; color: #f5f5f0; letter-spacing: -0.01em;">매출 2배</p>
      </div>

    </div>

  </div>

</body>
</html>
