<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #f5f5f0; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f0;
  display: flex;
  flex-direction: column;
  padding: 44pt 52pt 40pt 52pt;
}
</style>
</head>
<body>

  <!-- Slide header -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 28pt;">
    <div style="display: flex; align-items: center; gap: 8pt;">
      <div style="width: 3pt; height: 14pt; background: #1a1a1a; border-radius: 2pt;"></div>
      <p style="font-size: 10pt; font-weight: 600; color: #1a1a1a; letter-spacing: 0.04em;">Judgment Economy</p>
    </div>
    <p style="font-size: 9pt; color: #d4d4d0; letter-spacing: 0.02em;">05</p>
  </div>

  <!-- Content: Notion logo + data + equation -->
  <div style="display: flex; gap: 40pt; flex: 1; align-items: center;">

    <!-- Left: Notion logo + key data -->
    <div style="display: flex; flex-direction: column; gap: 20pt; flex: 1.2;">
      <div style="display: flex; align-items: center; gap: 12pt;">
        <img src="../assets/notion-logo.png" style="width: 36pt; height: 36pt;">
        <p style="font-size: 11pt; color: #999999; letter-spacing: 0.04em;">NOTION RESEARCH</p>
      </div>
      <div>
        <p style="font-size: 11pt; color: #999999; margin-bottom: 6pt;">컨설턴트가 들어간 회사의 매출</p>
        <p style="font-size: 56pt; font-weight: 800; color: #1a1a1a; line-height: 1; letter-spacing: -0.04em;">2배</p>
      </div>
    </div>

    <!-- Vertical divider -->
    <div style="width: 1pt; background: #d4d4d0; align-self: stretch;"></div>

    <!-- Right: equation + quote -->
    <div style="flex: 1; display: flex; flex-direction: column; gap: 20pt; justify-content: center;">

      <!-- Equation -->
      <div style="display: flex; flex-direction: column; gap: 10pt;">
        <div style="background: #e8e8e3; border-radius: 6pt; padding: 12pt 16pt;">
          <p style="font-size: 13pt; font-weight: 600; color: #1a1a1a; text-align: center;">AI 도구</p>
        </div>
        <div style="text-align: center;">
          <p style="font-size: 18pt; font-weight: 700; color: #1a1a1a;">+</p>
        </div>
        <div style="background: #e8e8e3; border-radius: 6pt; padding: 12pt 16pt;">
          <p style="font-size: 13pt; font-weight: 600; color: #1a1a1a; text-align: center;">판단력</p>
        </div>
        <div style="text-align: center;">
          <p style="font-size: 18pt; font-weight: 700; color: #1a1a1a;">=</p>
        </div>
        <div style="background: #1a1a1a; border-radius: 6pt; padding: 12pt 16pt;">
          <p style="font-size: 14pt; font-weight: 700; color: #ffffff; text-align: center;">2배 성장</p>
        </div>
      </div>

      <!-- Bottom quote -->
      <div style="padding-top: 12pt; border-top: 1pt solid #d4d4d0;">
        <p style="font-size: 12pt; font-weight: 600; color: #1a1a1a; text-align: center;">"판단력은 복리로 쌓인다"</p>
        <p style="font-size: 10pt; color: #999999; text-align: center; margin-top: 3pt;">— Notion</p>
      </div>

    </div>

  </div>

</body>
</html>
