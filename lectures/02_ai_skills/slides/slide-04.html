<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #f5f5f0; }
body {
  width: 720pt; height: 405pt;
  word-break: keep-all;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f0;
  display: flex;
  flex-direction: column;
  padding: 56pt 80pt 52pt 80pt;
  justify-content: space-between;
}
</style>
</head>
<body>

  <!-- Top: large opening quote mark as decorative element -->
  <div>
    <p style="font-size: 56pt; font-weight: 800; color: #d4d4d0; line-height: 0.8; letter-spacing: -0.04em; margin-bottom: 12pt;">"</p>
  </div>

  <!-- Hero quote block -->
  <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 0pt;">
    <h1 style="font-size: 34pt; font-weight: 700; color: #1a1a1a; line-height: 1.4; letter-spacing: -0.02em;">잘해서 자르는 게 아니라,</h1>
    <h1 style="font-size: 34pt; font-weight: 700; color: #1a1a1a; line-height: 1.4; letter-spacing: -0.02em;">잘할 것 같아서 자르고 있다</h1>
    <p style="font-size: 10pt; font-weight: 400; color: #999999; letter-spacing: 0.06em; margin-top: 16pt;">— Harvard Business Review, 2026</p>
  </div>

  <!-- Divider + reflection -->
  <div>
    <div style="width: 100%; height: 1pt; background: #d4d4d0; margin-bottom: 20pt;"></div>
    <div style="display: flex; align-items: baseline; gap: 0pt;">
      <p style="font-size: 16pt; font-weight: 300; color: #888888; line-height: 1.6; letter-spacing: -0.01em; font-style: italic;">AI가 교육 대본도 써준다면...&nbsp;&nbsp;</p>
      <p style="font-size: 16pt; font-weight: 800; color: #1a1a1a; line-height: 1.6; letter-spacing: -0.02em;">내가 여기 서 있는 이유는?</p>
    </div>
  </div>

</body>
</html>
