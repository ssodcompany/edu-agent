<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #f5f5f0; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 52pt 72pt;
}
</style>
</head>
<body>

  <div style="display: flex; flex-direction: column; gap: 28pt;">

    <!-- HBR Quote block -->
    <div style="display: flex; flex-direction: column; gap: 12pt;">
      <h1 style="font-size: 24pt; font-weight: 700; color: #1a1a1a; line-height: 1.55; letter-spacing: -0.02em;">
        "기업들이 AI가 잘해서 사람을 자르는 게 아니라,
      </h1>
      <h1 style="font-size: 24pt; font-weight: 700; color: #1a1a1a; line-height: 1.55; letter-spacing: -0.02em;">
        잘할 것 같아서 자르고 있다"
      </h1>
      <p style="font-size: 11pt; color: #999999; letter-spacing: 0.04em; font-weight: 500;">— Harvard Business Review, 2026</p>
    </div>

    <!-- Divider line -->
    <div style="width: 100%; height: 1pt; background: #d4d4d0;"></div>

    <!-- Reflection question -->
    <div style="display: flex; flex-direction: column; gap: 4pt;">
      <p style="font-size: 16pt; font-weight: 400; color: #666666; line-height: 1.65;">AI가 BNI 교육 대본도 써준다면...</p>
      <p style="font-size: 16pt; font-weight: 700; color: #1a1a1a; line-height: 1.65;">내가 여기 서 있는 이유는?</p>
    </div>

  </div>

</body>
</html>
