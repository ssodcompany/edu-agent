<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720, height=405">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', 'Apple SD Gothic Neo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #FFFFFF;
    overflow: hidden;
  }
  .slide {
    width: 720pt; height: 405pt;
    padding: 48pt 64pt;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .quote {
    color: #1A1A1A;
    font-size: 17pt;
    font-weight: 600;
    line-height: 1.6;
    margin-bottom: 10pt;
    letter-spacing: -0.3pt;
  }
  .source {
    color: #999999;
    font-size: 10pt;
    font-weight: 400;
    margin-bottom: 28pt;
  }
  .divider {
    width: 100%;
    height: 1pt;
    background: #E0E0E0;
    margin-bottom: 28pt;
  }
  .reflection {
    color: #444444;
    font-size: 15pt;
    font-weight: 500;
    line-height: 1.6;
  }
  .reflection .emphasis {
    color: #1A73E8;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="slide">
  <p class="quote">"기업들이 AI가 잘해서 사람을 자르는 게 아니라,<br>잘할 것 같아서 자르고 있다"</p>
  <p class="source">— Harvard Business Review</p>
  <div class="divider"></div>
  <p class="reflection">AI가 BNI 교육 대본도 완벽하게 써준다면...<br><span class="emphasis">내가 여기 서 있는 이유는?</span></p>
</div>
</body>
</html>
