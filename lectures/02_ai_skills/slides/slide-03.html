<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #f5f5f0; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f0;
  display: flex;
  overflow: hidden;
}
</style>
</head>
<body>

  <!-- LEFT: narrow label column (30%) -->
  <div style="width: 220pt; flex-shrink: 0; display: flex; flex-direction: column; padding: 44pt 32pt 44pt 44pt; border-right: 1pt solid #d4d4d0;">

    <!-- Claude logo + label -->
    <div style="display: flex; align-items: center; gap: 10pt; margin-bottom: 20pt;">
      <img src="../assets/claude-logo.png" style="width: 32pt; height: 32pt;">
      <div>
        <p style="font-size: 7pt; font-weight: 600; color: #999999; letter-spacing: 0.1em; margin-bottom: 2pt;">ANTHROPIC</p>
        <p style="font-size: 11pt; font-weight: 700; color: #1a1a1a; letter-spacing: -0.01em;">Claude · Skills</p>
      </div>
    </div>

    <!-- Description text: small and light -->
    <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 8pt;">
      <p style="font-size: 12pt; font-weight: 400; color: #666666; line-height: 1.75;">AI한테 회사 업무 방식을 가르치면</p>
      <p style="font-size: 12pt; font-weight: 400; color: #666666; line-height: 1.75;">이메일·제안서·PPT를</p>
      <p style="font-size: 12pt; font-weight: 600; color: #1a1a1a; line-height: 1.75;">우리 회사 스타일로 만든다</p>
    </div>

  </div>

  <!-- RIGHT: dominant (70%) — hero message + alert -->
  <div style="flex: 1; display: flex; flex-direction: column; padding: 44pt 48pt 44pt 44pt; justify-content: space-between;">

    <!-- Hero message: enormous -->
    <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 0pt;">
      <p style="font-size: 11pt; font-weight: 500; color: #999999; letter-spacing: 0.06em; margin-bottom: 12pt;">핵심 메시지</p>
      <h1 style="font-size: 38pt; font-weight: 800; color: #1a1a1a; line-height: 1.15; letter-spacing: -0.03em;">"3년차 직원처럼</h1>
      <h1 style="font-size: 38pt; font-weight: 800; color: #1a1a1a; line-height: 1.15; letter-spacing: -0.03em;">알아서 일한다"</h1>
    </div>

    <!-- Bottom warning strip -->
    <div style="background: #1a1a1a; padding: 14pt 24pt;">
      <p style="font-size: 13pt; font-weight: 600; color: #ffffff; letter-spacing: -0.01em;">여러분 경쟁사도 이미 쓰고 있을 겁니다</p>
    </div>

  </div>

</body>
</html>
