<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #f5f5f0; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f0;
  display: flex;
  flex-direction: column;
  padding: 44pt 52pt 40pt 52pt;
}
</style>
</head>
<body>

  <!-- Slide header -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32pt;">
    <div style="display: flex; align-items: center; gap: 8pt;">
      <div style="width: 3pt; height: 14pt; background: #1a1a1a; border-radius: 2pt;"></div>
      <p style="font-size: 10pt; font-weight: 600; color: #1a1a1a; letter-spacing: 0.04em;">AI 현황</p>
    </div>
    <p style="font-size: 9pt; color: #d4d4d0; letter-spacing: 0.02em;">03</p>
  </div>

  <!-- Two-column layout -->
  <div style="display: flex; gap: 40pt; flex: 1; align-items: stretch;">

    <!-- Left: Claude info -->
    <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20pt;">
      <!-- Logo + label -->
      <div style="display: flex; align-items: center; gap: 14pt;">
        <img src="../assets/claude-logo.png" style="width: 44pt; height: 44pt;">
        <div>
          <p style="font-size: 10pt; color: #999999; letter-spacing: 0.04em; margin-bottom: 3pt;">ANTHROPIC</p>
          <h2 style="font-size: 18pt; font-weight: 700; color: #1a1a1a; letter-spacing: -0.01em;">Claude의 Skills 기능</h2>
        </div>
      </div>
      <!-- Description -->
      <div style="display: flex; flex-direction: column; gap: 6pt;">
        <p style="font-size: 13pt; color: #666666; line-height: 1.7;">AI한테 우리 회사 업무 방식을 가르치면</p>
        <p style="font-size: 13pt; color: #666666; line-height: 1.7;">이메일, 제안서, PPT를</p>
        <p style="font-size: 13pt; font-weight: 600; color: #1a1a1a; line-height: 1.7;">우리 회사 스타일로 만들어준다</p>
      </div>
    </div>

    <!-- Vertical divider -->
    <div style="width: 1pt; background: #d4d4d0; flex-shrink: 0;"></div>

    <!-- Right: quote card -->
    <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 24pt;">
      <div style="background: #1a1a1a; border-radius: 8pt; padding: 24pt 28pt;">
        <p style="font-size: 15pt; font-weight: 700; color: #ffffff; line-height: 1.6; letter-spacing: -0.01em;">'3년차 직원처럼 알아서 일하는' 수준</p>
      </div>
      <div style="display: flex; flex-direction: column; gap: 4pt;">
        <div style="width: 20pt; height: 2pt; background: #1a1a1a; margin-bottom: 4pt;"></div>
        <p style="font-size: 13pt; color: #666666; line-height: 1.6;">여러분 경쟁사도</p>
        <p style="font-size: 13pt; font-weight: 600; color: #1a1a1a; line-height: 1.6;">이미 쓰고 있을 겁니다</p>
      </div>
    </div>

  </div>

</body>
</html>
