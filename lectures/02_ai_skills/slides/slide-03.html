<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720, height=405">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', 'Apple SD Gothic Neo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #FFFFFF;
    overflow: hidden;
  }
  .slide {
    width: 720pt; height: 405pt;
    padding: 40pt 48pt;
    display: flex;
    flex-direction: column;
  }
  .content {
    display: flex;
    gap: 32pt;
    flex: 1;
  }
  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .logo-row {
    display: flex;
    align-items: center;
    gap: 12pt;
    margin-bottom: 20pt;
  }
  .logo-row img {
    width: 48pt;
    height: 48pt;
  }
  .logo-label {
    color: #1A1A1A;
    font-size: 18pt;
    font-weight: 700;
  }
  .desc {
    color: #444444;
    font-size: 13pt;
    font-weight: 400;
    line-height: 1.7;
    margin-bottom: 6pt;
  }
  .right {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-left: 24pt;
    border-left: 2pt solid #E8E8E8;
  }
  .right-text {
    color: #1A1A1A;
    font-size: 16pt;
    font-weight: 600;
    line-height: 1.5;
  }
  .right-quote {
    color: #1A73E8;
    font-size: 14pt;
    font-weight: 500;
    margin-top: 16pt;
    line-height: 1.5;
  }
  .bottom-bar {
    margin-top: 16pt;
    padding-top: 14pt;
    border-top: 1pt solid #E8E8E8;
  }
  .bottom-text {
    color: #1A73E8;
    font-size: 13pt;
    font-weight: 600;
    text-align: center;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="content">
    <div class="left">
      <div class="logo-row">
        <img src="../assets/claude-logo.png" alt="Claude AI">
        <h2 class="logo-label">Claude의 Skills 기능</h2>
      </div>
      <p class="desc">AI한테 우리 회사 업무 방식을 가르치면</p>
      <p class="desc">이메일, 제안서, PPT를<br>우리 회사 스타일로 만들어준다</p>
    </div>
    <div class="right">
      <p class="right-text">"3년차 직원처럼<br>알아서 일하는" 수준</p>
      <p class="right-quote">반복 업무는 이미<br>AI의 영역입니다</p>
    </div>
  </div>
  <div class="bottom-bar">
    <p class="bottom-text">여러분 경쟁사도 이미 쓰고 있을 겁니다</p>
  </div>
</div>
</body>
</html>
