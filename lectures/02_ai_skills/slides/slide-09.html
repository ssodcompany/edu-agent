<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720, height=405">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', 'Apple SD Gothic Neo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #FFFFFF;
    overflow: hidden;
  }
  .slide {
    width: 720pt; height: 405pt;
    padding: 40pt 56pt;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .badge-wrap {
    display: inline-block;
    background: #1A73E8;
    padding: 4pt 10pt;
    margin-bottom: 12pt;
  }
  .badge {
    color: #FFFFFF;
    font-size: 10pt;
    font-weight: 700;
    letter-spacing: 0.5pt;
  }
  .title {
    color: #1A1A1A;
    font-size: 22pt;
    font-weight: 700;
    margin-bottom: 28pt;
    letter-spacing: -0.3pt;
  }
  .quote-box {
    border-left: 3pt solid #1A73E8;
    padding: 16pt 20pt;
    margin-bottom: 24pt;
    background: #F8F9FA;
  }
  .quote-text {
    color: #444444;
    font-size: 16pt;
    font-weight: 600;
    line-height: 1.6;
  }
  .key-line {
    color: #1A73E8;
    font-size: 15pt;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 12pt;
  }
  .sub {
    color: #666666;
    font-size: 13pt;
    font-weight: 400;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="badge-wrap"><p class="badge">SKILL 3</p></div>
  <h2 class="title">버리는 판단</h2>
  <div class="quote-box">
    <p class="quote-text">"사장님, 이건 안 하시는 게 맞습니다"</p>
  </div>
  <p class="key-line">"안 한다"고 말할 수 있는 것,<br>그것이 수수료의 진짜 근거입니다</p>
  <p class="sub">AI는 100개를 만들지만, 9개를 버리는 판단은 사람만 합니다</p>
</div>
</body>
</html>
