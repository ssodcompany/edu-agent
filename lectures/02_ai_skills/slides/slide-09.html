<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #f5f5f0; }
body {
  width: 720pt; height: 405pt;
  word-break: keep-all;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f0;
  display: flex;
  flex-direction: column;
  padding: 44pt 64pt 40pt 64pt;
}
</style>
</head>
<body>

  <!-- Badge -->
  <div style="margin-bottom: 10pt;">
    <div style="background: #1a1a1a; padding: 5pt 14pt; display: inline-block;">
      <p style="font-size: 8pt; font-weight: 700; color: #ffffff; letter-spacing: 0.14em;">SKILL 3</p>
    </div>
  </div>
  <!-- Title -->
  <h2 style="font-size: 26pt; font-weight: 800; color: #1a1a1a; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 24pt;">버리는 판단</h2>

  <!-- Inverted quote block: dark = maximum impact -->
  <div style="background: #1a1a1a; padding: 20pt 28pt; margin-bottom: 24pt;">
    <h3 style="font-size: 20pt; font-weight: 700; color: #ffffff; line-height: 1.5; letter-spacing: -0.01em;">"사장님, 이건 안 하시는 게 맞습니다"</h3>
  </div>

  <!-- Key line -->
  <div style="flex: 1; display: flex; align-items: flex-end;">
    <div>
      <p style="font-size: 16pt; font-weight: 600; color: #1a1a1a; line-height: 1.55; letter-spacing: -0.01em;">'안 한다'고 말할 수 있는 것,</p>
      <p style="font-size: 16pt; font-weight: 600; color: #1a1a1a; line-height: 1.55; letter-spacing: -0.01em;">그것이 수수료의 진짜 근거입니다</p>
    </div>
  </div>

</body>
</html>
