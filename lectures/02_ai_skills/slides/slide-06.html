<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #1a1a1a; }
body {
  width: 720pt; height: 405pt;
  word-break: keep-all;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a1a;
  display: flex;
  overflow: hidden;
}
</style>
</head>
<body>

  <!-- LEFT: title block (55%) -->
  <div style="width: 390pt; flex-shrink: 0; display: flex; flex-direction: column; padding: 52pt 48pt 52pt 64pt; justify-content: space-between; border-right: 1pt solid #2e2e2e;">

    <div>
      <p style="font-size: 8pt; font-weight: 600; color: #555555; letter-spacing: 0.14em; margin-bottom: 24pt;">CORE FRAMEWORK</p>
      <h1 style="font-size: 34pt; font-weight: 800; color: #ffffff; line-height: 1.2; letter-spacing: -0.03em;">AI가 따라올 수 없는</h1>
      <h1 style="font-size: 34pt; font-weight: 800; color: #ffffff; line-height: 1.2; letter-spacing: -0.03em;">세 가지 판단력</h1>
    </div>

    <div style="width: 40pt; height: 3pt; background: #ffffff;"></div>

  </div>

  <!-- RIGHT: three numbered items (45%) -->
  <div style="flex: 1; display: flex; flex-direction: column; padding: 52pt 52pt 52pt 48pt; justify-content: center; gap: 0pt;">

    <!-- Item 1 -->
    <div style="display: flex; align-items: baseline; gap: 16pt; padding-bottom: 20pt; border-bottom: 1pt solid #2e2e2e;">
      <p style="font-size: 32pt; font-weight: 800; color: #333333; line-height: 1; letter-spacing: -0.04em; flex-shrink: 0; width: 32pt;">1</p>
      <p style="font-size: 16pt; font-weight: 500; color: #cccccc; letter-spacing: -0.01em;">맥락을 읽는 판단</p>
    </div>

    <!-- Item 2 -->
    <div style="display: flex; align-items: baseline; gap: 16pt; padding: 20pt 0pt; border-bottom: 1pt solid #2e2e2e;">
      <p style="font-size: 32pt; font-weight: 800; color: #333333; line-height: 1; letter-spacing: -0.04em; flex-shrink: 0; width: 32pt;">2</p>
      <p style="font-size: 16pt; font-weight: 500; color: #cccccc; letter-spacing: -0.01em;">리스크를 감수하는 판단</p>
    </div>

    <!-- Item 3 -->
    <div style="display: flex; align-items: baseline; gap: 16pt; padding-top: 20pt;">
      <p style="font-size: 32pt; font-weight: 800; color: #333333; line-height: 1; letter-spacing: -0.04em; flex-shrink: 0; width: 32pt;">3</p>
      <p style="font-size: 16pt; font-weight: 500; color: #cccccc; letter-spacing: -0.01em;">버리는 판단</p>
    </div>

  </div>

</body>
</html>
