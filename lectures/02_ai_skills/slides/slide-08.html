<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720, height=405">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', 'Apple SD Gothic Neo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #FFFFFF;
    overflow: hidden;
  }
  .slide {
    width: 720pt; height: 405pt;
    padding: 40pt 56pt;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .badge-wrap {
    display: inline-block;
    background: #1A73E8;
    padding: 4pt 10pt;
    margin-bottom: 12pt;
  }
  .badge {
    color: #FFFFFF;
    font-size: 10pt;
    font-weight: 700;
    letter-spacing: 0.5pt;
  }
  .title {
    color: #1A1A1A;
    font-size: 22pt;
    font-weight: 700;
    margin-bottom: 28pt;
    letter-spacing: -0.3pt;
  }
  .quote-box {
    border-left: 3pt solid #1A73E8;
    padding: 16pt 20pt;
    margin-bottom: 24pt;
    background: #F8F9FA;
  }
  .quote-text {
    color: #444444;
    font-size: 14pt;
    font-weight: 500;
    line-height: 1.7;
  }
  .key-line {
    color: #1A1A1A;
    font-size: 14pt;
    font-weight: 600;
    line-height: 1.6;
  }
  .key-line .blue {
    color: #1A73E8;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="badge-wrap"><p class="badge">SKILL 2</p></div>
  <h2 class="title">리스크를 감수하는 판단</h2>
  <div class="quote-box">
    <p class="quote-text">발주 중단을 추천받아도,<br>"어려울 때 도와주면 갚을 사람"이라며 밀어붙이는 것</p>
  </div>
  <p class="key-line">AI는 추천은 하지만 <span class="blue">책임지지 않습니다.</span><br>새벽 2시에 전화 받는 건 여러분이에요.</p>
</div>
</body>
</html>
