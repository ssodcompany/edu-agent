<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #f5f5f0; }
body {
  width: 720pt; height: 405pt;
  word-break: keep-all;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f0;
  display: flex;
  flex-direction: column;
  padding: 44pt 44pt 40pt 44pt;
}
</style>
</head>
<body>

  <!-- Badge -->
  <div style="margin-bottom: 10pt;">
    <div style="background: #1a1a1a; padding: 5pt 14pt; display: inline-block;">
      <p style="font-size: 8pt; font-weight: 700; color: #ffffff; letter-spacing: 0.14em;">SKILL 2</p>
    </div>
  </div>
  <!-- Title -->
  <h2 style="font-size: 26pt; font-weight: 800; color: #1a1a1a; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 24pt;">리스크를 감수하는 판단</h2>

  <!-- Quote block -->
  <div style="border-left: 4pt solid #1a1a1a; padding: 18pt 24pt; background: #e8e8e3; margin-bottom: 24pt;">
    <p style="font-size: 14pt; font-weight: 500; color: #1a1a1a; line-height: 1.75;">발주 중단을 추천받아도,</p>
    <p style="font-size: 14pt; font-weight: 500; color: #1a1a1a; line-height: 1.75;">"어려울 때 도와주면 갚을 사람"이라며 밀어붙이는 것</p>
  </div>

  <!-- Key line: split for emphasis -->
  <div style="flex: 1; display: flex; align-items: flex-end; flex-direction: column; gap: 0pt; justify-content: flex-end;">
    <p style="font-size: 17pt; font-weight: 700; color: #1a1a1a; line-height: 1.45; letter-spacing: -0.01em; align-self: flex-start;">AI는 추천은 하지만 책임지지 않습니다.</p>
    <p style="font-size: 17pt; font-weight: 700; color: #1a1a1a; line-height: 1.45; letter-spacing: -0.01em; align-self: flex-start;">새벽 2시에 전화 받는 건 여러분이에요.</p>
  </div>

</body>
</html>
