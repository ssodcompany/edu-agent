<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #1a1a1a; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a1a;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 56pt 72pt;
}
</style>
</head>
<body>

  <div style="display: flex; flex-direction: column; gap: 28pt;">

    <!-- Main question block -->
    <div style="display: flex; flex-direction: column; gap: 2pt;">
      <h1 style="font-size: 30pt; font-weight: 700; color: #ffffff; line-height: 1.55; letter-spacing: -0.02em;">이거 AI한테 시키면 되겠다 하고</h1>
      <h1 style="font-size: 30pt; font-weight: 700; color: #ffffff; line-height: 1.55; letter-spacing: -0.02em;">직원한테 줄 일을 안 준 적</h1>
      <h1 style="font-size: 30pt; font-weight: 700; color: #ffffff; line-height: 1.55; letter-spacing: -0.02em;">있으신 분?</h1>
    </div>

    <!-- Thin separator -->
    <div style="width: 100%; height: 1pt; background: #333333;"></div>

    <!-- Follow-up -->
    <div style="display: flex; flex-direction: column; gap: 2pt;">
      <p style="font-size: 18pt; font-weight: 400; color: #999999; line-height: 1.65; letter-spacing: -0.01em;">여러분의 고객도, 여러분한테</p>
      <p style="font-size: 18pt; font-weight: 400; color: #999999; line-height: 1.65; letter-spacing: -0.01em;">똑같은 생각을 하고 있을 수 있습니다.</p>
    </div>

  </div>

</body>
</html>
