<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720, height=405">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', 'Apple SD Gothic Neo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #FFFFFF;
    overflow: hidden;
  }
  .slide {
    width: 720pt; height: 405pt;
    padding: 60pt 64pt;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .hook {
    color: #1A1A1A;
    font-size: 22pt;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 32pt;
    letter-spacing: -0.3pt;
  }
  .hook .highlight {
    color: #1A73E8;
  }
  .followup {
    color: #666666;
    font-size: 16pt;
    font-weight: 500;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="slide">
  <p class="hook">"<span class="highlight">이거 AI한테 시키면 되겠다</span> 하고<br>직원한테 줄 일을 안 준 적 있으신 분?"</p>
  <p class="followup">여러분의 고객도,<br>여러분한테 똑같은 생각을 하고 있을 수 있습니다.</p>
</div>
</body>
</html>
