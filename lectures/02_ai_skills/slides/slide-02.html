<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #1a1a1a; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a1a;
  display: flex;
  flex-direction: column;
  padding: 52pt 72pt 52pt 72pt;
}
</style>
</head>
<body>

  <!-- Main question — hero moment -->
  <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 0pt;">

    <!-- Setup line: small -->
    <p style="font-size: 16pt; font-weight: 400; color: #666666; line-height: 1.4; letter-spacing: -0.01em; margin-bottom: 8pt;">이거 AI한테 시키면 되겠다 하고</p>

    <!-- Hero question: massive -->
    <h1 style="font-size: 40pt; font-weight: 800; color: #ffffff; line-height: 1.2; letter-spacing: -0.03em;">직원한테 줄 일을</h1>
    <h1 style="font-size: 40pt; font-weight: 800; color: #ffffff; line-height: 1.2; letter-spacing: -0.03em;">안 준 적 있으신 분?</h1>

  </div>

  <!-- Dramatic spacer + sub-text -->
  <div style="border-top: 1pt solid #333333; padding-top: 24pt;">
    <p style="font-size: 14pt; font-weight: 300; color: #555555; line-height: 1.7; letter-spacing: -0.01em;">여러분의 고객도, 여러분한테 똑같은 생각을 하고 있을 수 있습니다.</p>
  </div>

</body>
</html>
