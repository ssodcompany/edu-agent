<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #f5f5f0; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f0;
  display: flex;
  flex-direction: column;
  padding: 48pt 64pt;
  justify-content: center;
}
</style>
</head>
<body>

  <div style="display: flex; flex-direction: column; gap: 24pt;">

    <!-- Badge + title -->
    <div style="display: flex; flex-direction: column; gap: 10pt;">
      <div style="display: inline-block; background: #1a1a1a; border-radius: 4pt; padding: 5pt 14pt; align-self: flex-start;">
        <p style="font-size: 9pt; font-weight: 600; color: #ffffff; letter-spacing: 0.12em;">SKILL 1</p>
      </div>
      <h2 style="font-size: 32pt; font-weight: 800; color: #1a1a1a; letter-spacing: -0.02em; line-height: 1.2;">맥락을 읽는 판단</h2>
    </div>

    <!-- Quote box -->
    <div style="border-left: 3pt solid #1a1a1a; padding: 16pt 24pt; background: #e8e8e3; border-radius: 0 6pt 6pt 0;">
      <p style="font-size: 14pt; font-weight: 500; color: #1a1a1a; line-height: 1.75;">"올해 좀 힘들어요..." 라는 거래처 사장님의 말이</p>
      <p style="font-size: 14pt; font-weight: 500; color: #1a1a1a; line-height: 1.75;">단순 세금 불만인지, 사업 정리 고민인지 알아채는 것</p>
    </div>

    <!-- Key line -->
    <div style="display: flex; align-items: center; gap: 12pt;">
      <div style="width: 20pt; height: 1pt; background: #1a1a1a; flex-shrink: 0;"></div>
      <p style="font-size: 15pt; font-weight: 600; color: #1a1a1a; line-height: 1.5;">소주 한잔의 대화에서 나오는 맥락은 AI에게 없습니다</p>
    </div>

  </div>

</body>
</html>
