<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720, height=405">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: 'Pretendard', 'Apple SD Gothic Neo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #FFFFFF;
    overflow: hidden;
  }
  .slide {
    width: 720pt; height: 405pt;
    padding: 40pt 56pt;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .badge-wrap {
    display: inline-block;
    background: #1A73E8;
    padding: 4pt 10pt;
    margin-bottom: 12pt;
  }
  .badge {
    color: #FFFFFF;
    font-size: 10pt;
    font-weight: 700;
    letter-spacing: 0.5pt;
  }
  .title {
    color: #1A1A1A;
    font-size: 22pt;
    font-weight: 700;
    margin-bottom: 28pt;
    letter-spacing: -0.3pt;
  }
  .quote-box {
    border-left: 3pt solid #1A73E8;
    padding: 16pt 20pt;
    margin-bottom: 24pt;
    background: #F8F9FA;
  }
  .quote-text {
    color: #444444;
    font-size: 14pt;
    font-weight: 500;
    line-height: 1.7;
  }
  .quote-text .inline-quote {
    color: #1A1A1A;
    font-weight: 600;
  }
  .key-line {
    color: #1A1A1A;
    font-size: 15pt;
    font-weight: 600;
    line-height: 1.5;
  }
  .key-line .blue {
    color: #1A73E8;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="badge-wrap"><p class="badge">SKILL 1</p></div>
  <h2 class="title">맥락을 읽는 판단</h2>
  <div class="quote-box">
    <p class="quote-text"><span class="inline-quote">"올해 좀 힘들어요..."</span> 라는 거래처 사장님의 말이<br>단순 세금 불만인지, 사업 정리 고민인지 알아채는 것</p>
  </div>
  <p class="key-line"><span class="blue">소주 한잔의 대화</span>에서 나오는 맥락은 AI에게 없습니다</p>
</div>
</body>
</html>
