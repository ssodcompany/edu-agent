<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #f5f5f0; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f0;
  display: flex;
  flex-direction: column;
  padding: 44pt 64pt 40pt 64pt;
}
</style>
</head>
<body>

  <!-- Badge + Title row -->
  <div style="display: flex; align-items: center; gap: 16pt; margin-bottom: 28pt;">
    <div style="background: #1a1a1a; padding: 5pt 14pt; flex-shrink: 0;">
      <p style="font-size: 8pt; font-weight: 700; color: #ffffff; letter-spacing: 0.14em;">SKILL 1</p>
    </div>
    <h2 style="font-size: 34pt; font-weight: 800; color: #1a1a1a; letter-spacing: -0.03em; line-height: 1.1;">맥락을 읽는 판단</h2>
  </div>

  <!-- Quote block: left border + bg -->
  <div style="border-left: 4pt solid #1a1a1a; padding: 18pt 24pt; background: #e8e8e3; margin-bottom: 24pt;">
    <p style="font-size: 14pt; font-weight: 500; color: #1a1a1a; line-height: 1.75;">"올해 좀 힘들어요..." 라는 거래처 사장님의 말이</p>
    <p style="font-size: 14pt; font-weight: 500; color: #1a1a1a; line-height: 1.75;">단순 세금 불만인지, 사업 정리 고민인지 알아채는 것</p>
  </div>

  <!-- Key line: large, confident -->
  <div style="flex: 1; display: flex; align-items: flex-end;">
    <h3 style="font-size: 18pt; font-weight: 700; color: #1a1a1a; line-height: 1.4; letter-spacing: -0.02em;">소주 한잔의 대화에서 나오는 맥락은 AI에게 없습니다</h3>
  </div>

</body>
</html>
