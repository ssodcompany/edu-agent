<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #f5f5f0; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
</style>
</head>
<body>

  <!-- Header bar -->
  <div style="padding: 16pt 52pt; border-bottom: 1pt solid #d4d4d0; flex-shrink: 0;">
    <p style="font-size: 9pt; font-weight: 600; color: #1a1a1a; letter-spacing: 0.08em;">BNI 60초 소개 — Before / After</p>
  </div>

  <!-- Two-column comparison: 38% / 62% split -->
  <div style="flex: 1; display: flex; overflow: hidden;">

    <!-- LEFT: AI version — muted, smaller, receding -->
    <div style="width: 268pt; flex-shrink: 0; background: #e8e8e3; padding: 28pt 32pt; display: flex; flex-direction: column; gap: 16pt; border-right: 1pt solid #d4d4d0;">
      <div>
        <p style="font-size: 8pt; font-weight: 600; color: #aaaaaa; letter-spacing: 0.1em; margin-bottom: 8pt;">AI가 5초 만에 쓴 소개</p>
        <div style="width: 20pt; height: 1pt; background: #bbbbbb;"></div>
      </div>
      <div>
        <p style="font-size: 12pt; font-weight: 400; color: #999999; line-height: 1.85;">주거, 상업 공간 인테리어 합니다.</p>
        <p style="font-size: 12pt; font-weight: 400; color: #999999; line-height: 1.85;">리모델링 필요하신 분 소개해주세요.</p>
      </div>
    </div>

    <!-- RIGHT: Human judgment — dominant, bolder, more space -->
    <div style="flex: 1; background: #f5f5f0; padding: 28pt 40pt; display: flex; flex-direction: column; gap: 16pt; border-left: 3pt solid #1a1a1a;">
      <div>
        <p style="font-size: 8pt; font-weight: 700; color: #1a1a1a; letter-spacing: 0.1em; margin-bottom: 8pt;">내 판단력이 담긴 소개</p>
        <div style="width: 28pt; height: 2pt; background: #1a1a1a;"></div>
      </div>
      <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 4pt;">
        <p style="font-size: 15pt; font-weight: 700; color: #1a1a1a; line-height: 1.7;">도면 보고 3분 안에</p>
        <p style="font-size: 15pt; font-weight: 700; color: #1a1a1a; line-height: 1.7;">'여기 건드리면 큰일 납니다'를 찾아냅니다.</p>
        <p style="font-size: 15pt; font-weight: 700; color: #1a1a1a; line-height: 1.7;">2호점 내시는 프랜차이즈 사장님 소개해주세요.</p>
      </div>
    </div>

  </div>

</body>
</html>
