<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #f5f5f0; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f0;
  display: flex;
  flex-direction: column;
  padding: 40pt 52pt;
}
</style>
</head>
<body>

  <!-- Slide header -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24pt;">
    <div style="display: flex; align-items: center; gap: 8pt;">
      <div style="width: 3pt; height: 14pt; background: #1a1a1a; border-radius: 2pt;"></div>
      <p style="font-size: 10pt; font-weight: 600; color: #1a1a1a; letter-spacing: 0.04em;">BNI 60초 소개 — Before / After</p>
    </div>
    <p style="font-size: 9pt; color: #d4d4d0; letter-spacing: 0.02em;">10</p>
  </div>

  <!-- Two-column comparison -->
  <div style="display: flex; gap: 20pt; flex: 1; align-items: stretch;">

    <!-- Left: AI version -->
    <div style="flex: 1; background: #e8e8e3; border-radius: 8pt; padding: 24pt 28pt; display: flex; flex-direction: column; gap: 16pt;">
      <div>
        <p style="font-size: 9pt; font-weight: 600; color: #999999; letter-spacing: 0.08em; margin-bottom: 4pt;">AI가 5초 만에 쓴 소개</p>
        <div style="width: 24pt; height: 2pt; background: #cccccc; border-radius: 1pt;"></div>
      </div>
      <p style="font-size: 13pt; font-weight: 400; color: #888888; line-height: 1.8;">주거, 상업 공간 인테리어 합니다.</p>
      <p style="font-size: 13pt; font-weight: 400; color: #888888; line-height: 1.8;">리모델링 필요하신 분 소개해주세요.</p>
    </div>

    <!-- VS label (no text in div) -->
    <div style="display: flex; align-items: center; justify-content: center; width: 36pt; flex-shrink: 0;">
      <p style="font-size: 12pt; font-weight: 700; color: #cccccc;">VS</p>
    </div>

    <!-- Right: human judgment version -->
    <div style="flex: 1; background: #ffffff; border: 2pt solid #1a1a1a; border-radius: 8pt; padding: 24pt 28pt; display: flex; flex-direction: column; gap: 16pt;">
      <div>
        <p style="font-size: 9pt; font-weight: 600; color: #1a1a1a; letter-spacing: 0.08em; margin-bottom: 4pt;">내 판단력이 담긴 소개</p>
        <div style="width: 24pt; height: 2pt; background: #1a1a1a; border-radius: 1pt;"></div>
      </div>
      <p style="font-size: 13pt; font-weight: 600; color: #1a1a1a; line-height: 1.8;">도면 보고 3분 안에</p>
      <p style="font-size: 13pt; font-weight: 600; color: #1a1a1a; line-height: 1.8;">'여기 건드리면 큰일 납니다'를 찾아냅니다.</p>
      <p style="font-size: 13pt; font-weight: 600; color: #1a1a1a; line-height: 1.8;">2호점 내시는 프랜차이즈 사장님 소개해주세요.</p>
    </div>

  </div>

</body>
</html>
