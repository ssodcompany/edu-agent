<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #f5f5f0; }
body {
  width: 720pt; height: 405pt;
  word-break: keep-all;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f0;
  display: flex;
  flex-direction: column;
  padding: 44pt 72pt 44pt 72pt;
  justify-content: space-between;
}
</style>
</head>
<body>

  <!-- TOP: three skills as tight inline list -->
  <div>
    <p style="font-size: 8pt; font-weight: 600; color: #999999; letter-spacing: 0.12em; margin-bottom: 12pt;">대체 불가능한 나만의 Skills</p>
    <div style="display: flex; align-items: center; gap: 0pt;">
      <p style="font-size: 14pt; font-weight: 500; color: #1a1a1a; letter-spacing: -0.01em;">내가 읽는 맥락</p>
      <p style="font-size: 14pt; font-weight: 300; color: #cccccc; padding: 0pt 12pt;">·</p>
      <p style="font-size: 14pt; font-weight: 500; color: #1a1a1a; letter-spacing: -0.01em;">내가 감수하는 리스크</p>
      <p style="font-size: 14pt; font-weight: 300; color: #cccccc; padding: 0pt 12pt;">·</p>
      <p style="font-size: 14pt; font-weight: 500; color: #1a1a1a; letter-spacing: -0.01em;">내가 버리는 것들</p>
    </div>
  </div>

  <!-- Hairline divider -->
  <div style="width: 100%; height: 1pt; background: #d4d4d0;"></div>

  <!-- BOTTOM: homework formula — hero moment of the entire deck -->
  <div>
    <div style="display: flex; align-items: center; gap: 10pt; margin-bottom: 16pt;">
      <div style="background: #1a1a1a; padding: 4pt 12pt;">
        <p style="font-size: 8pt; font-weight: 700; color: #ffffff; letter-spacing: 0.14em;">HOMEWORK</p>
      </div>
    </div>

    <!-- The formula: the biggest text on this slide -->
    <h1 style="font-size: 26pt; font-weight: 800; color: #1a1a1a; line-height: 1.55; letter-spacing: -0.02em;">"저는 [___]를 하는 사람이 아니라,</h1>
    <h1 style="font-size: 26pt; font-weight: 800; color: #1a1a1a; line-height: 1.55; letter-spacing: -0.02em;">[___]를 판단하는 사람입니다."</h1>

    <p style="font-size: 10pt; font-weight: 400; color: #999999; margin-top: 14pt; letter-spacing: 0.02em;">다음 주 60초 소개의 첫 문장으로 써보세요.</p>
  </div>

</body>
</html>
