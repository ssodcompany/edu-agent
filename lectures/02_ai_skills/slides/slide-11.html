<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #f5f5f0; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f0;
  display: flex;
  flex-direction: column;
  padding: 48pt 64pt;
  justify-content: space-between;
}
</style>
</head>
<body>

  <!-- Top: title + three skills -->
  <div style="display: flex; flex-direction: column; gap: 20pt;">
    <h2 style="font-size: 28pt; font-weight: 800; color: #1a1a1a; letter-spacing: -0.02em; line-height: 1.2;">대체 불가능한 나만의 Skills</h2>

    <!-- Three skill tags -->
    <div style="display: flex; gap: 12pt; align-items: center;">
      <div style="border: 1pt solid #1a1a1a; border-radius: 20pt; padding: 7pt 18pt;">
        <p style="font-size: 12pt; font-weight: 500; color: #1a1a1a;">내가 읽는 맥락</p>
      </div>
      <div style="width: 16pt; height: 1pt; background: #d4d4d0;"></div>
      <div style="border: 1pt solid #1a1a1a; border-radius: 20pt; padding: 7pt 18pt;">
        <p style="font-size: 12pt; font-weight: 500; color: #1a1a1a;">내가 감수하는 리스크</p>
      </div>
      <div style="width: 16pt; height: 1pt; background: #d4d4d0;"></div>
      <div style="border: 1pt solid #1a1a1a; border-radius: 20pt; padding: 7pt 18pt;">
        <p style="font-size: 12pt; font-weight: 500; color: #1a1a1a;">내가 버리는 것들</p>
      </div>
    </div>
  </div>

  <!-- Divider -->
  <div style="width: 100%; height: 1pt; background: #d4d4d0;"></div>

  <!-- Bottom: homework formula -->
  <div style="display: flex; flex-direction: column; gap: 16pt;">
    <div style="display: flex; align-items: center; gap: 10pt;">
      <div style="background: #1a1a1a; border-radius: 4pt; padding: 4pt 12pt; display: inline-block;">
        <p style="font-size: 8pt; font-weight: 600; color: #ffffff; letter-spacing: 0.1em;">HOMEWORK</p>
      </div>
    </div>

    <!-- Formula block -->
    <div style="background: #e8e8e3; border-radius: 8pt; border-left: 3pt solid #1a1a1a; padding: 20pt 28pt;">
      <p style="font-size: 17pt; font-weight: 700; color: #1a1a1a; line-height: 1.7; letter-spacing: -0.01em;">"저는 <span style="text-decoration: underline; text-decoration-color: #1a1a1a;">[___]</span>를 하는 사람이 아니라,</p>
      <p style="font-size: 17pt; font-weight: 700; color: #1a1a1a; line-height: 1.7; letter-spacing: -0.01em;"><span style="text-decoration: underline; text-decoration-color: #1a1a1a;">[___]</span>를 판단하는 사람입니다."</p>
    </div>

    <p style="font-size: 11pt; color: #999999; line-height: 1.5;">다음 주 60초 소개의 첫 문장으로 써보세요.</p>
  </div>

</body>
</html>
